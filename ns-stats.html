<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nightscout Stats</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #111; color: #eee; }
    .card { background: #1b1b1b; padding: 1.5rem; border-radius: 0.75rem; max-width: 420px; }
    h1 { margin-top: 0; font-size: 1.4rem; }
    .row { display: flex; justify-content: space-between; margin: 0.4rem 0; }
    .label { opacity: 0.8; }
    .value { font-weight: 600; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; }
    button { background: #2f6fed; color: #fff; font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { margin-top: 0.75rem; font-size: 0.9rem; opacity: 0.8; }
    select { margin-bottom: 1rem; padding: 0.4rem; border-radius: 0.4rem; background: #222; color: #eee; border: 1px solid #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Glucose Stats</h1>

    <label for="range">Range:</label>
    <select id="range" onchange="loadStats()">
      <option value="7">7 Days</option>
      <option value="14">14 Days</option>
      <option value="30" selected>30 Days</option>
      <option value="60">60 Days</option>
      <option value="90">90 Days</option>
    </select>

    <div class="row"><div class="label">Average BG</div><div class="value" id="avg">–</div></div>
    <div class="row"><div class="label">Estimated A1c</div><div class="value" id="a1c">–</div></div>
    <div class="row"><div class="label">Standard Deviation</div><div class="value" id="sd">–</div></div>

    <div class="row"><div class="label">Time in Range (70–180)</div><div class="value" id="tir">–</div></div>
    <div class="row"><div class="label">Below Range (&lt;70)</div><div class="value" id="tbr">–</div></div>
    <div class="row"><div class="label">Above Range (&gt;180)</div><div class="value" id="tar">–</div></div>

    <button id="btn" onclick="loadStats()">Refresh</button>
    <div id="status"></div>
  </div>

  <script>
    const BASE_URL = "https://mstry9google.nightscoutfree.com ";
    const TOKEN = "read1-85949d1e3fd02e59"; // your working readable token

    async function loadStats() {
      const btn = document.getElementById("btn");
      const status = document.getElementById("status");
      const days = parseInt(document.getElementById("range").value, 10);

      btn.disabled = true;
      status.textContent = `Loading last ${days} days…`;

      const now = new Date();
      const past = new Date(now.getTime() - days * 24 * 60 * 60 * 1000).toISOString();

      const url = `${BASE_URL}/api/v1/entries/sgv.json?find[dateString][$gte]=${encodeURIComponent(past)}&count=0&token=${TOKEN}`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const values = data.map(x => x.sgv).filter(v => typeof v === "number");

        if (!values.length) {
          status.textContent = "No SGV data available.";
          btn.disabled = false;
          return;
        }

        // Average
        const avg = values.reduce((a,b) => a + b, 0) / values.length;

        // Estimated A1c
        const a1c = (avg + 46.7) / 28.7;

        // Standard deviation
        const variance = values.reduce((a,b) => a + Math.pow(b - avg, 2), 0) / values.length;
        const sd = Math.sqrt(variance);

        // Time‑in‑Range
        const total = values.length;
        const inRange = values.filter(v => v >= 70 && v <= 180).length;
        const belowRange = values.filter(v => v < 70).length;
        const aboveRange = values.filter(v => v > 180).length;

        const tir = (inRange / total) * 100;
        const tbr = (belowRange / total) * 100;
        const tar = (aboveRange / total) * 100;

        // Update UI
        document.getElementById("avg").textContent = avg.toFixed(1);
        document.getElementById("a1c").textContent = a1c.toFixed(2);
        document.getElementById("sd").textContent = sd.toFixed(1);

        document.getElementById("tir").textContent = tir.toFixed(1) + "%";
        document.getElementById("tbr").textContent = tbr.toFixed(1) + "%";
        document.getElementById("tar").textContent = tar.toFixed(1) + "%";

        status.textContent = `Using ${values.length} readings from last ${days} days.`;
      } catch (e) {
        status.textContent = `Error: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    // auto-load once
    loadStats();
  </script>
</body>
</html>
