<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NS Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        background: #000;
        color: cyan;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
    }
    select, input {
        padding: 10px;
        margin: 10px;
        font-size: 16px;
        width: 80%;
        max-width: 300px;
    }
    button {
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
        background: cyan;
        border: none;
        color: black;
        font-weight: bold;
        cursor: pointer;
    }
    .server-row {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 5px 0;
    }
    .server-name {
        flex: 1;
        text-align: right;
        padding-right: 10px;
    }
    .delete-btn {
        background: red;
        color: white;
        padding: 5px 10px;
        font-size: 14px;
        border: none;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>NS Stats</h1>

<h2>Servers</h2>

<div id="serverList"></div>

<h3>Add Server</h3>
<input id="friendlyName" placeholder="Friendly Name">
<input id="serverURL" placeholder="Server URL (no trailing slash)">
<input id="apiToken" placeholder="API Token">
<button onclick="addServer()">Add Server</button>

<script>
    function loadServers() {
        const list = document.getElementById("serverList");
        list.innerHTML = "";

        const servers = JSON.parse(localStorage.getItem("servers") || "[]");

        servers.forEach((srv, index) => {
            const row = document.createElement("div");
            row.className = "server-row";

            const name = document.createElement("div");
            name.className = "server-name";
            name.textContent = srv.name;

            const del = document.createElement("button");
            del.className = "delete-btn";
            del.textContent = "Delete";
            del.onclick = () => deleteServer(index);

            row.appendChild(name);
            row.appendChild(del);
            list.appendChild(row);
        });
    }

    function addServer() {
        const name = document.getElementById("friendlyName").value.trim();
        const url = document.getElementById("serverURL").value.trim();
        const token = document.getElementById("apiToken").value.trim();

        if (!name || !url || !token) return;

        const servers = JSON.parse(localStorage.getItem("servers") || "[]");

        servers.push({ name, url, token });

        localStorage.setItem("servers", JSON.stringify(servers));

        document.getElementById("friendlyName").value = "";
        document.getElementById("serverURL").value = "";
        document.getElementById("apiToken").value = "";

        loadServers();
    }

    function deleteServer(index) {
        const servers = JSON.parse(localStorage.getItem("servers") || "[]");

        servers.splice(index, 1);

        localStorage.setItem("servers", JSON.stringify(servers));

        loadServers();
    }

    loadServers();
</script>

</body>
</html>
